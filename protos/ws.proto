syntax = "proto3";

package com.web3tech.cex.ws.proto;

option java_package = "com.web3tech.cex.ws.proto";
option java_multiple_files = true;

// =============================================================================
// Server -> Client Envelope (wraps all outgoing messages)
// =============================================================================

message WsEnvelope {
  int32 code = 1;
  string msg = 2;
  WsResult result = 3;
  map<string, string> ext_info = 4;
  int64 time = 5;
}

message WsResult {
  oneof payload {
    SubscribedEvent subscribed = 1;
    UnsubscribedEvent unsubscribed = 2;
    PingEvent ping = 3;
    DataEvent data = 4;
  }
  string trace_id = 6;
}

message SubscribedEvent {
  repeated string streams = 1;
  string trace_id = 2;
}

message UnsubscribedEvent {
  repeated string streams = 1;
  string trace_id = 2;
}


message PingEvent {
  string trace_id = 1;
}

message DataEvent {
  string stream = 1;
  bytes data = 2;
  string trace_id = 3;
}

enum WsErrorCode {
  WS_ERROR_CODE_UNSPECIFIED = 0;
  SUBSCRIPTION_LIMIT_EXCEEDED = 1;
  INVALID_STREAM = 2;
  STREAM_NOT_SUBSCRIBED = 3;
  INVALID_MESSAGE = 4;
  AUTHENTICATION_REQUIRED = 5;
  RATE_LIMIT_EXCEEDED = 6;
  INTERNAL_ERROR = 7;
}

// =============================================================================
// Client -> Server Messages
// =============================================================================

message WsClientMessage {
  oneof payload {
    SubscribeMessage subscribe = 1;
    UnsubscribeMessage unsubscribe = 2;
    PongMessage pong = 3;
    SubmitFirmQuoteMessage submit_firm_quote = 4;
    SubmitRawPriceMessage submit_raw_price = 5;
    CreateRfqMessage create_rfq = 6;
    CreateOrderMessage create_order = 7;
    CancelOrderMessage cancel_order = 8;
    BatchCreateOrderMessage batch_create_order = 9;
    BatchCancelOrderMessage batch_cancel_order = 10;
    CancelAllOrdersMessage cancel_all_orders = 11;
  }
  string trace_id = 12;
}

message SubscribeMessage {
  repeated string streams = 1;
  string trace_id = 2;
}

message UnsubscribeMessage {
  repeated string streams = 1;
  string trace_id = 2;
}

message PongMessage {
  string trace_id = 1;
}

// Market Maker submits a firm quote in response to a firm quote request
message SubmitFirmQuoteMessage {
  int64 rfq_id = 1;
  QuoteSideWs side = 2;          // BID (MM buys) or ASK (MM sells)
  string price = 3;
  string quantity = 4;           // Max volume
  string min_quantity = 5;       // Min volume for execution
  int64 ttl_ms = 6;              // Quote time to live
  string client_quote_id = 7;    // Client ID for tracking on bot side
  string market_id = 8;          // Market pair (e.g. BTC_USDT) for balance pre-check
  string trace_id = 9;
}

// Taker creates a new RFQ request
message CreateRfqMessage {
  string market_id = 1;          // Market pair (e.g. BTC_USDT)
  string side = 2;               // "BUY" or "SELL" (from taker's perspective)
  string quantity = 3;           // Decimal as string
  string worst_price = 4;        // Worst acceptable price
  int64 ttl_ms = 5;              // RFQ lifetime in milliseconds
  string trace_id = 6;
}

// Market Maker submits indicative price (RawPrice) for streaming
message SubmitRawPriceMessage {
  string symbol = 1;             // Market pair (BTC_USDT)
  
  // BID - MM is willing to BUY (taker sells)
  string bid = 2;                // Buy price from MM
  string bid_size = 3;           // Max buy volume
  string bid_min_size = 4;       // Min buy volume
  
  // ASK - MM is willing to SELL (taker buys)
  string ask = 5;                // Sell price from MM
  string ask_size = 6;           // Max sell volume
  string ask_min_size = 7;       // Min sell volume
  
  int64 ttl_ms = 8;              // Time to live, default = 5000ms

  // Optional full orderbook levels from provider.
  // If present, server will use these levels for aggregation (and can derive top-of-book bid/ask from them).
  repeated PriceLevelProto bids_levels = 9;
  repeated PriceLevelProto asks_levels = 10;
  string trace_id = 11;
}

// Client creates a new order (regular or stop)
message CreateOrderMessage {
  string market_id = 1;              // Market pair (e.g. BTC_USDT)
  string side = 2;                   // "BUY" or "SELL"
  string order_type = 3;             // "LIMIT", "MARKET", "STOP_LOSS", "STOP_LIMIT", "TAKE_PROFIT", "TAKE_PROFIT_LIMIT"
  string time_in_force = 4;          // "GTC", "IOC", "FOK", "GTD"
  string quantity = 5;               // Decimal as string
  string price = 6;                  // Decimal as string (empty for MARKET orders)
  string stop_price = 7;             // Decimal as string (for stop orders)
  string quote_amount = 8;           // Decimal as string (for MARKET BUY)
  bool post_only = 9;
  string account_type = 10;          // "SPOT" (default)
  string client_order_id = 11;       // Optional client tracking ID
  int64 expires_at_ms = 12;          // Optional GTD expiry (epoch millis)
  string trace_id = 13;
}

// Client cancels an existing order (provide user_order_id OR order_id)
message CancelOrderMessage {
  string user_order_id = 1;          // User-facing client order ID (provide this OR order_id)
  string account_type = 2;           // "SPOT" (default)
  int64 order_id = 3;               // Numeric system order ID (provide this OR user_order_id)
  string trace_id = 4;
}

// Client creates multiple orders in a single request
message BatchCreateOrderMessage {
  repeated CreateOrderMessage orders = 1;
  string trace_id = 2;
}

// Client cancels multiple orders by their order IDs
message BatchCancelOrderMessage {
  repeated int64 order_ids = 1;
  string account_type = 2;       // "SPOT" (default)
  string trace_id = 3;
}

// Client cancels all active orders
message CancelAllOrdersMessage {
  string account_type = 1;       // "SPOT" (default)
  string market_id = 2;          // Optional market filter (empty = all markets)
  string trace_id = 3;
}

// Quote side enum for WS messages
enum QuoteSideWs {
  QUOTE_SIDE_WS_UNSPECIFIED = 0;
  BID_WS = 1;  // MM buys (taker sells)
  ASK_WS = 2;  // MM sells (taker buys)
}

// =============================================================================
// Data Messages (sent inside DataEvent.data)
// =============================================================================

message PriceLevelProto {
  string price = 1;
  string size = 2;
  string trace_id = 3;
}

message OrderbookSnapshotProto {
  string event = 1;
  string market_id = 2;
  repeated PriceLevelProto bids = 3;
  repeated PriceLevelProto asks = 4;
  int64 market_seq = 5;                // matcher sequence
  int32 depth = 6;
  int64 seq_num = 7;                   // per-session stream counter, always 0 for snapshot
  int64 timestamp_ms = 8;              // gateway send time (epoch millis)
  string trace_id = 9;
}

message OrderbookDeltaProto {
  string event = 1;
  string market_id = 2;
  string side = 3;
  string price = 4;
  string size = 5;
  int64 market_seq = 6;
  string trace_id = 7;
}

message TradeProto {
  string event = 1;
  string market_id = 2;
  string trade_id = 3;
  string price = 4;
  string quantity = 5;
  string side = 6;
  string timestamp = 7;
  string trace_id = 8;
}

message TickerProto {
  string event = 1;
  string market_id = 2;
  optional string last_price = 3;
  optional string best_bid = 4;
  optional string best_ask = 5;
  string volume_24h = 6;
  optional string high_24h = 7;
  optional string low_24h = 8;
  optional string change_24h = 9;
  string timestamp = 10;
  optional string best_bid_size = 11;
  optional string best_ask_size = 12;
  optional string prev_price_24h = 13;
  optional string turnover_24h = 14;
  string trace_id = 15;
}

message AggregatePriceProto {
  string event = 1;
  string market_id = 2;
  string aggregate_price = 3;
  string change_24h = 4;
  string timestamp = 5;
  string trace_id = 6;
}

message CandleProto {
  string event = 1;
  string market_id = 2;
  string timeframe = 3;
  string open_time = 4;
  string close_time = 5;
  string open = 6;
  string high = 7;
  string low = 8;
  string close = 9;
  string volume = 10;
  int64 trades = 11;
  bool closed = 12;
  string quote_volume = 13;
  string trace_id = 14;
}

// Batch of orderbook deltas for a single market (accumulated over flush interval).
// Deltas for the same price+side are deduplicated (last size wins).
message OrderbookDeltaBatchProto {
  string event = 1;                    // "orderbook_delta"
  string market_id = 2;
  repeated PriceLevelProto bids = 3;
  repeated PriceLevelProto asks = 4;
  int64 market_seq = 5;                // matcher sequence
  int64 seq_num = 6;                   // per-session stream counter, starts from 1
  int64 timestamp_ms = 7;              // gateway send time (epoch millis)
  string trace_id = 8;
}

// Batch of trades for a single market (accumulated over flush interval).
message TradeBatchProto {
  string event = 1;                    // "trade"
  string market_id = 2;
  repeated TradeProto trades = 3;
  string trace_id = 4;
}

// Batch of private user events (accumulated over flush interval).
message UserEventBatchProto {
  repeated UserEventProto events = 1;
  string trace_id = 2;
}

message UserOrderProto {
  string event = 1;
  string user_order_id = 2;       // User-facing client order ID (string)
  string market_id = 3;
  string status = 4;
  optional string side = 5;
  optional string order_type = 6;
  optional string price = 7;
  optional string quantity = 8;
  optional string filled_quantity = 9;
  optional string reason = 10;
  string timestamp = 11;
  int64 order_id = 12;            // System numeric order ID
  optional string base_asset = 13;
  optional string quote_asset = 14;
  optional string time_in_force = 15;
  optional string remaining_quantity = 16;
  optional string filled_quote_amount = 17;
  optional string stop_price = 18;
  optional bool post_only = 19;
  optional string fee_asset = 20;
  optional string fee_paid = 21;
  optional string quote_quantity = 22;
  optional int64 created_at = 23;     // epoch millis
  optional int64 updated_at = 24;     // epoch millis
  optional int64 closed_at = 25;      // epoch millis
  string trace_id = 26;
}

message UserFillProto {
  string event = 1;
  string trade_id = 2;
  string user_order_id = 3;       // User-facing client order ID (string)
  string market_id = 4;
  string side = 5;
  string price = 6;
  string quantity = 7;
  string timestamp = 8;
  int64 order_id = 9;             // System numeric order ID
  string fee = 10;                // Fee amount as decimal string
  string base_asset = 11;
  string quote_asset = 12;
  string quote_quantity = 13;
  string fee_asset = 14;
  bool is_maker = 15;
  bool is_self_trade = 16;
  int64 execution_id = 17;
  string trace_id = 18;
}

message UserBalanceProto {
  string event = 1;
  string asset_id = 2;
  string account_type = 3;
  string available = 4;
  string reserved = 5;
  string timestamp = 6;
  int64 version = 7;           // monotonic balance version from HBE
  string trace_id = 8;
}

message RfqQuoteProto {
  int64 quote_id = 1;
  int64 provider_user_id = 2;
  string price = 3;
  string quantity = 4;
  optional string client_quote_id = 5;
  string trace_id = 6;
}

message RfqEventProto {
  string event = 1;
  int64 rfq_id = 2;
  string status = 3;
  optional string market_id = 4;
  optional string side = 5;
  optional string quantity = 6;
  repeated RfqQuoteProto quotes = 7;
  optional int64 quote_id = 8;
  optional string client_quote_id = 9;
  optional int64 provider_user_id = 10;
  optional string price = 11;
  optional string reason = 12;
  optional string error = 13;
  optional int64 timeout_ms = 14;
  string timestamp = 15;
  string trace_id = 16;
}

message MarketsAvailableProto {
  string event = 1;
  repeated string markets = 2;
  string trace_id = 3;
}

message UserTransferProto {
  string event = 1;
  string transfer_id = 2;
  string asset_id = 3;
  string amount = 4;
  string from_account_type = 5;
  string to_account_type = 6;
  string timestamp = 7;
  string status = 8;
  string message = 9;
  string from_available = 10;
  string from_reserved = 11;
  string to_available = 12;
  string to_reserved = 13;
  string created_at = 14;
  string trace_id = 15;
}

// Unified wrapper for all private user events (sent on the "user" stream).
// Client parses UserEventProto and switches on the oneof to determine the event type.
message UserEventProto {
  oneof payload {
    UserOrderProto order = 1;
    UserFillProto fill = 2;
    UserBalanceProto balance = 3;
    UserTransferProto transfer = 4;
    RfqEventProto rfq = 5;
  }
  string trace_id = 6;
}
